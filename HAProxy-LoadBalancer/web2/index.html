<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Web Server 2</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:#020617;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.particles{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}

.particles span{
    position:absolute;
    width:4px;
    height:4px;
    background:#00e5ff;
    border-radius:50%;
    animation:animate 10s linear infinite;
}

@keyframes animate{
    from{
        transform:translateY(100vh) scale(0);
        opacity:0;
    }
    to{
        transform:translateY(-10vh) scale(1);
        opacity:1;
    }
}

.container{
    position:relative;
    z-index:2;
    text-align:center;
}

h1{
    font-size:95px;
    color:#00e5ff;
    text-shadow:
    0 0 10px #00e5ff,
    0 0 30px #00e5ff,
    0 0 60px #00e5ff;
}

p{
    margin-top:20px;
    font-size:22px;
    letter-spacing:4px;
    color:#d1d5db;
}

.card{
    margin-top:40px;
    padding:25px 70px;
    border-radius:25px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:
    0 0 30px rgba(0,229,255,0.3);
    backdrop-filter:blur(15px);
    font-size:30px;
    letter-spacing:4px;
}

.ring{
    position:absolute;
    width:500px;
    height:500px;
    border:2px solid rgba(0,229,255,0.1);
    border-radius:50%;
    animation:rotate 20s linear infinite;
}

@keyframes rotate{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

</style>
</head>

<body>

<div class="particles">
    <span style="left:10%;animation-duration:6s;"></span>
    <span style="left:20%;animation-duration:9s;"></span>
    <span style="left:35%;animation-duration:12s;"></span>
    <span style="left:50%;animation-duration:7s;"></span>
    <span style="left:70%;animation-duration:10s;"></span>
    <span style="left:85%;animation-duration:5s;"></span>
</div>

<div class="ring"></div>

<div class="container">
    <h1>SERVER 02</h1>
    <p>DISTRIBUTED CLOUD NODE</p>

    <div class="card">
        ONLINE
    </div>
</div>

</body>
</html>
